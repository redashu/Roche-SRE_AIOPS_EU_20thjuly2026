<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bedrock Llama Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            background: #f5f5f5;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .chat-box {
            background: white;
            border-radius: 8px;
            padding: 15px;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid #ddd;
        }
        .msg {
            margin: 10px 0;
            padding: 10px 14px;
            border-radius: 8px;
            line-height: 1.4;
            white-space: pre-wrap;
        }
        .user {
            background: #d1e7ff;
            text-align: right;
            margin-left: 60px;
        }
        .ai {
            background: #e6e6e6;
            margin-right: 60px;
        }
        .label {
            font-weight: bold;
            font-size: 0.85em;
            color: #555;
            display: block;
            margin-bottom: 4px;
        }
        form {
            display: flex;
            margin-top: 15px;
            gap: 8px;
        }
        input[type=text] {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 1em;
        }
        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            background: #007bff;
            color: white;
            font-size: 1em;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .clear-btn {
            background: #999;
        }
        .clear-btn:hover {
            background: #666;
        }
        .footer-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <h2>Amazon Bedrock - Meta Llama 3 Chat</h2>

    <div class="chat-box">
        {% for msg in history %}
            {% if msg.role == "user" %}
                <div class="msg user">
                    <span class="label">You</span>
                    {{ msg.text }}
                </div>
            {% else %}
                <div class="msg ai">
                    <span class="label">AI</span>
                    {{ msg.text }}
                </div>
            {% endif %}
        {% endfor %}
    </div>

    <form action="/chat" method="post">
        <input type="text" name="prompt" placeholder="Type your message..." autocomplete="off" required autofocus>
        <button type="submit">Send</button>
    </form>

    <div class="footer-row">
        <form action="/clear" method="post">
            <button type="submit" class="clear-btn">Clear Chat</button>
        </form>
    </div>
</body>
</html>
